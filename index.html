<!doctype html>
<html lang="en">
  <head>
    <script>
      const theme = localStorage.getItem("theme");

      if (
        theme === "dark" ||
        (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO -->
    <title>PasswordLab - Secure Password Generator</title>
    <meta
      name="description"
      content="Generate strong, secure, and random passwords instantly with PasswordLab. Customize length, symbols, and strength."
    />
    <meta
      name="keywords"
      content="password generator, secure password, random password, strong password tool"
    />
    <meta name="author" content="PasswordLab" />
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Open Graph (for sharing) -->
    <meta
      property="og:title"
      content="PasswordLab - Secure Password Generator"
    />
    <meta
      property="og:description"
      content="Generate strong and secure passwords instantly."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com" />
    <meta property="og:image" content="https://your-domain.com/preview.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
